  <script>
    $(function () {
      $("#footerhook").load("footer.html");
    });
    // ON LOAD ==============================================================================================================================
    var var_ws = new WebSocket("ws://192.168.10.114:8085");
    $(document).ready(async function () {
      await loadManifesto(15);

      setInterval(async () => {
        await loadManifesto(15);
      }, 15000);

      setTimeout(() => {
        var_ws.onopen = function () {
          console.log("Connected to WebSocket server");
        };

        var_ws.onmessage = async function (event) {
          await loadManifesto(15);
        };

        var_ws.onclose = function () {
          console.log("Disconnected from WebSocket server");
        };
      }, 1000);
    });

    // LOAD =================================================================================================================
    // CARREGAR INFO DE LISTA DE ESPERA
    var arrayEspera = [];
    // CARREGAR LISTA DE MANIFESTOS
    var sky_aviao = [];
    var sky_piloto = [];
    var sky_instrutor = [];
    var sky_altura = [];
    var sky_manifesto = [];
    var sky_marcacao = [];
    async function loadManifesto(minutosMargem, esc = 0) {
      let datahora = new Date();
      datahora.setMinutes(datahora.getMinutes() - minutosMargem);
      let info = {};
      info.datahora = minutosMargem;
      info.esc = esc;
      await $.ajax({
        type: "POST",
        url: "connect.php",
        data: {
          origin: "module/marc/php/manifestodb.php",
          function: "loadManifestoEcra",
          attr: JSON.stringify(info),
        },
      })
        .done(async function (response) {
          let obj = JSON.parse(response);
          if (obj.val == 1) {
            sky_manifesto = obj.sky_manifesto;
            sky_piloto = obj.sky_piloto;
            sky_aviao = obj.sky_aviao;
            sky_instrutor = obj.sky_instrutor;
            sky_marcacao = obj.sky_marcacao;
            sky_altura = obj.sky_altura;
            await htmlManifesto();
          } else {
            console.log(obj.msg);
          }
        })
        .fail(function (jqXHR, textStatus) {
          console.log("Request failed: " + textStatus);
        });
    }

    async function htmlManifesto() {
      const viewportWidth = window.innerWidth;
      const isMobile = viewportWidth <= 767;
      const isTablet = viewportWidth > 767 && viewportWidth <= 1024;
      const cardFontSize = isMobile ? 16 : isTablet ? 18 : 20;
      const rowHeight = isMobile ? 38 : isTablet ? 42 : 45;
      const countFontSize = isMobile ? 16 : isTablet ? 18 : 22;
      const textFontSize = isMobile ? 15 : isTablet ? 18 : 20;
      const selectFontSize = isMobile ? 16 : isTablet ? 18 : 20;
      const alturaSelectFontSize = isMobile ? 15 : isTablet ? 16 : 18;
      const loFontSize = isMobile ? 18 : isTablet ? 20 : 24;
      const headerMetaFont = isMobile ? 14 : 17;
      const headerCountFont = isMobile ? 15 : 18;
      const supportIconFontSize = isMobile ? 18 : isTablet ? 21 : 25;
      const supportImageSize = isMobile ? 18 : isTablet ? 22 : 25;
      const supportRightPhoto = isMobile ? "30%" : isTablet ? "28%" : "27%";
      const supportRightVideo = isMobile ? "23%" : isTablet ? "22.5%" : "22%";

      let htmlListaManifesto = "";
      for (let index = 0; index < sky_manifesto.length; index++) {
        const aM = sky_manifesto[index];
        let count = 0;
        let data = new Date(aM.hora_saida_more.replace(" ", "T"));
        let aviao = sky_aviao.filter((item) => item.id == aM.id_aviao)[0];
        // let pioto = sky_piloto.filter((item) => item.id == aM.id_piloto)[0].nome;
        let dataAtual = new Date();
        let diferencaEmMinutos = Math.abs(
          ((data - dataAtual) / (1000 * 60)).toFixed(0),
        );
        htmlListaManifesto += `
				<div class="card card-voos p-0" style="width:100%;max-width:600px;font-size:${cardFontSize}px !important" id="manifesto_form_${aM.id}">
					<div class="card-header card-voos-header ${data < dataAtual ? "card-voos-header-red" : "card-voos-header-green"} bg-primary text-white d-flex justify-content-between">
						<span style="width:40%;font-size:${headerMetaFont}px">${aM.n} - ${data < dataAtual ? `${diferencaEmMinutos}min ago` : `Take off in: ${diferencaEmMinutos}min`}  </span>
						<div style="width:5%;text-align:right;font-size:${headerCountFont}px" class="ml-auto" id="manifesto_aviao_lugares_${aM.id}">

						</div>
					</div>
					<div class="row" style='width:100%;margin: 0!important'>
						<div class='col-md-6' style='margin: 0!important;display:flex' id="div_manifesto_aviao_${aM.id}">
							<p style='margin-right:10px;margin-top:10px;'><strong>Avião:</strong></p> <select id="manifesto_aviao_${aM.id}" class="form-control form-control-sm select2-manifesto"  style="height:${rowHeight}px !important;font-size:${selectFontSize}px !important" onchange="changeManifesto(${aM.id}, 'id_aviao', this.value)"></select>
						</div>
						<div class='col-md-6' style='margin: 0!important;display:flex' id="div_manifesto_piloto_${aM.id}">
							<p style='margin-right:10px;margin-top:10px;'><strong>Piloto:</strong></p> <select id="manifesto_piloto_${aM.id}" class="form-control form-control-sm select2-manifesto"  style="height:${rowHeight}px !important;font-size:${selectFontSize}px !important" onchange="changeManifesto(${aM.id}, 'id_piloto', this.value)"></select>
						</div>
					</div>
					<div class="drop_manifesto p-10" style='height:100%'  id="manifesto_marcacoes_${aM.id}">`;
        var htmlListaManifesto2 = "";
        for (let index3 = 0; index3 < sky_marcacao.length; index3++) {
          const arrayG = sky_marcacao[index3]; // Grupo
          if (arrayG.id_manifesto == aM.id) {
            htmlListaManifesto2 = "";
            for (let index2 = 0; index2 < arrayG.marcacaoes.length; index2++) {
              const marcM = arrayG.marcacaoes[index2]; // Marcação
              if (index2 == 0) {
                htmlListaManifesto += `
										<div class="diagram-wrapper drag_marcacao" data-marcacao_grupo_id="${arrayG.marcacao_grupo_id}">
											<div class="diagram-box vertical-rect-left" style="font-size:${textFontSize}px !important;">${marcM.tipo_grupo_descricao}</div>
											<div class="left-stack">
									`;
                htmlListaManifesto2 += `<div class="right-stack">`;
              }
              var hideBox = false;
              if (marcM.id_paraquedista_tipo == 4) {
                hideBox = true;
              }
              // Primeiro Instrutor
              if (marcM.sky_manifesto_paraquedista.length > 0) {
                // Primeiro Instrutor
                count++;
                var instroname = "";
                sky_instrutor.map((item) =>
                  item.id == marcM.sky_manifesto_paraquedista[0].id_paraquedista
                    ? (instroname = item.name)
                    : "",
                );

                htmlListaManifesto += `
									<div class="horizontal-rect" style='display:flex;height:${rowHeight}px !important;${index2 != 0 ? "border-top:2px solid black;" : ""}${marcM.cor != null ? `background-color:${marcM.cor};` : ""}'>
										<div class="diagram-box" style='width:30px;font-size:${countFontSize}px;'>${count}</div>
										<div class="diagram-box horizontal-rect-instutor w-100" id="div_marcacao_instrutor_${marcM.sky_manifesto_paraquedista[0].id}">
											<div class="diagram-box" style="position:relative;font-size:${textFontSize}px;text-align:left;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"><b>${instroname.toUpperCase()}</b></div>
											<div class="form-check form-switch" style='width:15px;padding-top:0;position:absolute;right:${supportRightPhoto};${hideBox ? `visibility:hidden;` : ""}' title="Suporte">
												${parseInt(marcM.sky_manifesto_paraquedista[0].suporte_foto) == 1 ? `<label class="form-check-label" style="font-size:${supportIconFontSize}px" for="marcacao_instrutor_suporte_foto_${marcM.sky_manifesto_paraquedista[0].id}"><i class="fas fa-camera"></i></label>` : ""}
											</div>
											<div class="form-check form-switch" style='width:15px;padding-top:0;position:absolute;right:${supportRightVideo};${hideBox ? `visibility:hidden;` : ""}' title="Suporte">
												${parseInt(marcM.sky_manifesto_paraquedista[0].suporte_video) == 1 ? `<label class="form-check-label" style="font-size:${supportIconFontSize}px" for="marcacao_instrutor_suporte_video_${marcM.sky_manifesto_paraquedista[0].id}"><i class="fas fa-video"></i></label>` : ""}
											</div>
											${marcM.sky_manifesto_paraquedista[0].load_organizer == 1 ? `<b style='position:absolute;right:11%;font-size:${loFontSize}px;'>LO</b>` : ""}
										</div>
									</div>
									`;
                htmlListaManifesto2 += `<div class="horizontal-rect" style='display:flex;height:${rowHeight}px !important;${index2 != 0 ? "border-top:2px solid black;" : ""}'> &nbsp; </div>`;
              }
              count++;
              htmlListaManifesto += `
									<div class="horizontal-rect" style='display:flex;height:${rowHeight}px !important;${marcM.sky_manifesto_paraquedista.length == 0 && index2 != 0 ? "border-top:2px solid black;" : ""}${marcM.cor != null ? `background-color:${marcM.cor};` : ""}'>
										<div class="diagram-box" style='width:30px;font-size:${countFontSize}px;'>${count}</div>
										<div class="diagram-box" style="position:relative;font-size:${textFontSize}px;text-align:left;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:40px;">
											${marcM.client_date_birth == 1 ? "<i class='fas fa-birthday-cake'></i>&nbsp;" : ""}&nbsp;${marcM.client_name}${marcM.load_organizer == 1 ? ` <b style='position:absolute;right:11%;font-size:${loFontSize}px;'>LO</b>` : ""}</div>
									</div>
								`;
              htmlListaManifesto2 += `<div class="horizontal-rect" style='display:flex;height:${rowHeight}px !important;${marcM.sky_manifesto_paraquedista.length == 0 && index2 != 0 ? "border-top:2px solid black;" : ""}'>
									<select id="marcacao_altura_${marcM.id}" onchange="changeAltura(${marcM.id},${arrayG.marcacao_grupo_id}, ${aM.id})" class="form-control form-control-sm" style="height:${rowHeight}px;width:100%;padding:1px;text-align:center;-webkit-appearance: none;-moz-appearance: none; appearance: none;height:${rowHeight}px !important;font-size:${alturaSelectFontSize}px;">
												</select></div>`;
              if (parseInt(marcM.n_participantes) > 1) {
                for (
                  let indexpart = 2;
                  indexpart <= parseInt(marcM.n_participantes);
                  indexpart++
                ) {
                  count++;
                  htmlListaManifesto += `
										<div style='justify-content: center;display:flex;align-items: center;font-size:${textFontSize}px;height:${rowHeight}px;${marcM.cor != null ? `background-color: ${marcM.cor}` : ""}' class="diagram-box horizontal-rect">
											<div class="diagram-box" style='width:30px;font-size:${textFontSize}px;'>${count}</div>
											<div class="diagram-box" style="position:relative;font-size:${textFontSize}px;text-align:left;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Paraquedista ${indexpart}</div>
										</div>`;
                  htmlListaManifesto2 += `<div class="horizontal-rect" style='display:flex;height:${rowHeight}px !important;${index2 != 0 ? "border-top:2px solid black;" : ""}'> &nbsp; </div>`;
                }
              }
              // Segundo Instrutor
              if (marcM.sky_manifesto_paraquedista.length > 1) {
                for (
                  let indexP = 1;
                  indexP < marcM.sky_manifesto_paraquedista.length;
                  indexP++
                ) {
                  count++;
                  const outrosInstrutor =
                    marcM.sky_manifesto_paraquedista[indexP]; // Outros instrutores
                  var instroname = "";
                  sky_instrutor.map((item) =>
                    item.id ==
                    marcM.sky_manifesto_paraquedista[indexP].id_paraquedista
                      ? (instroname = item.name)
                      : "",
                  );
                  htmlListaManifesto += `
										<div class="horizontal-rect" style='display:flex;height:${rowHeight}px !important;${marcM.cor != null ? `background-color:${marcM.cor}` : ""}'>
											<div class="diagram-box" style='width:30px;font-size:${countFontSize}px;'>${count}</div>
											<div class="diagram-box horizontal-rect horizontal-rect-instutor w-100" id="div_marcacao_instrutor_${outrosInstrutor.id}">
												<div class="diagram-box" style="position:relative;font-size:${textFontSize}px;text-align:left;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"><b>${instroname.toUpperCase()}</b></div>
												<div class="form-check form-switch" style='width:15px;padding-top:0;position:absolute;right:${supportRightPhoto};${hideBox ? `visibility:hidden;` : ""}' title="Load Organizer">
													${parseInt(outrosInstrutor.suporte_foto) == 1 ? `<label class="form-check-label" for="marcacao_instrutor_suporte_foto_${outrosInstrutor.id}"><img style="width:${supportImageSize}px" src="./assets/img/icons/foto-externo.png"/></label>` : "&nbsp;"}
												</div>
												<div class="form-check form-switch" style='width:15px;padding-top:0;position:absolute;right:${supportRightVideo};${hideBox ? `visibility:hidden;` : ""}' title="Suporte">
													${parseInt(outrosInstrutor.suporte_video) == 1 ? `<label class="form-check-label" for="marcacao_instrutor_suporte_video_${outrosInstrutor.id}"><img style="width:${supportImageSize}px" src="./assets/img/icons/video-externo.png"/></label>` : "&nbsp;"}
												</div>
												${parseInt(outrosInstrutor.load_organizer) == 1 ? `<b style='position:absolute;right:11%;font-size:${loFontSize}px;'>LO</b>` : ""}
											</div>
										</div>
										`;
                  htmlListaManifesto2 += `<div class="horizontal-rect" style='display:flex;height:${rowHeight}px !important'> &nbsp; </div>`;
                }
              }
            }
            htmlListaManifesto2 += `</div>`;
            htmlListaManifesto += `
											</div>${htmlListaManifesto2}
											<div style="width:0.1%" class="diagram-box vertical-rect-right"></div>
										</div>
							`;
          }
        }

        htmlListaManifesto += `</div>
				</div>
			`;
      }

      // let htmlSelectInstrutor = `<option value="0">Selecione o instrutor...</option>`+sky_instrutor.map((item) => item.esp.includes(1) || item.esp.includes(2) ? `<option value='${item.id}'>${item.name}</option>` : "")
      // let htmlSelectInstrutor = `<option value="0">Selecione o instrutor...</option>`+sky_instrutor.map((item) => `<option value='${item.id}'>${item.name}</option>`)
      let htmlSelectInstrutor =
        `<option value="0">Selecione o instrutor...</option>` +
        sky_instrutor.map((item) =>
          item.esp.includes(1)
            ? `<option value='${item.id}'>${item.name}</option>`
            : "",
        );
      let htmlSelectCamara =
        `<option value="0">Selecione o instrutor...</option>` +
        sky_instrutor.map((item) =>
          item.esp.includes(2)
            ? `<option value='${item.id}'>${item.name}</option>`
            : "",
        );
      let htmlSelectAviao =
        `<option value="0">Selecione uma opção...</option>` +
        sky_aviao.map(
          (item) => `<option value='${item.id}'>${item.descricao}</option>`,
        );
      let htmlSelectPiloto =
        `<option value="0">Selecione uma opção...</option>` +
        sky_piloto.map(
          (item) => `<option value='${item.id}'>${item.nome}</option>`,
        );
      let htmlSelectAltura = sky_altura.map(
        (item) => `<option value='${item.altura}'>${item.altura}</option>`,
      );

      // Aplicar o html
      $("#lista_manifesto").html(htmlListaManifesto);

      // Aplicar select2 aos select do manifesto
      for (let index = 0; index < sky_manifesto.length; index++) {
        const manifesto = sky_manifesto[index];
        $(`#manifesto_aviao_${manifesto.id}`).html(htmlSelectAviao);
        $(`#manifesto_aviao_${manifesto.id}`).val(
          manifesto.id_aviao != null ? manifesto.id_aviao : 0,
        );
        //$(`#manifesto_aviao_${manifesto.id}`).addClass('select2-manifesto').select2({
        //	width: '100%',
        //	dropdownParent: $(`#div_manifesto_aviao_${manifesto.id}`)
        //});
        $(`#manifesto_piloto_${manifesto.id}`).html(htmlSelectPiloto);
        $(`#manifesto_piloto_${manifesto.id}`).val(
          manifesto.id_piloto != null ? manifesto.id_piloto : 0,
        );
        //$(`#manifesto_piloto_${manifesto.id}`).addClass('select2-manifesto').select2({
        //	width: '100%',
        //	dropdownParent: $(`#div_manifesto_piloto_${manifesto.id}`)
        //});
        let aviao = sky_aviao.filter(
          (item) => item.id == manifesto.id_aviao,
        )[0];
        let totalLugaresOcupado = 0;
        for (let index2 = 0; index2 < sky_marcacao.length; index2++) {
          const grupo = sky_marcacao[index2]; // Grupo
          if (grupo.id_manifesto == manifesto.id) {
            console.log(sky_marcacao[index2]);
            for (let index3 = 0; index3 < grupo.marcacaoes.length; index3++) {
              const marcacao = grupo.marcacaoes[index3];
              //totalLugaresOcupado += 1;
              if (parseInt(marcacao.n_participantes) > 1) {
                totalLugaresOcupado +=
                  parseInt(marcacao.n_participantes) +
                  marcacao.sky_manifesto_paraquedista.length;
              } else {
                totalLugaresOcupado +=
                  1 + marcacao.sky_manifesto_paraquedista.length;
              }
            }
          }
        }
        $(`#manifesto_aviao_lugares_${manifesto.id}`).text(
          aviao.lugares - totalLugaresOcupado,
        );
      }

      // *** INSTRUTORES ***
      // Criar um mapa para rastrear todos os instrutores por id_manifesto
      const instrutoresPorManifesto = {};

      // Passo 1: Mapear os instrutores selecionados por id_manifesto
      for (let index = 0; index < sky_marcacao.length; index++) {
        const grupo = sky_marcacao[index];
        for (let index2 = 0; index2 < grupo.marcacaoes.length; index2++) {
          const marcacao = grupo.marcacaoes[index2];
          const idManifesto = marcacao.id_manifesto;
          if (!instrutoresPorManifesto[idManifesto]) {
            instrutoresPorManifesto[idManifesto] = new Set();
          }
          for (
            let index3 = 0;
            index3 < marcacao.sky_manifesto_paraquedista.length;
            index3++
          ) {
            const instrutor = marcacao.sky_manifesto_paraquedista[index3];
            if (instrutor.id_paraquedista) {
              instrutoresPorManifesto[idManifesto].add(
                String(instrutor.id_paraquedista),
              ); // Garantir string
            }
          }
        }
      }

      // Passo 2: Aplicar select2 aos selects dos instrutores
      for (let index = 0; index < sky_marcacao.length; index++) {
        const grupo = sky_marcacao[index];

        for (let index2 = 0; index2 < grupo.marcacaoes.length; index2++) {
          const marcacao = grupo.marcacaoes[index2];
          const idManifesto = marcacao.id_manifesto;
          $(`#marcacao_altura_${marcacao.id}`).html(htmlSelectAltura);
          $(`#marcacao_altura_${marcacao.id}`).val(marcacao.altura);
          for (
            let index3 = 0;
            index3 < marcacao.sky_manifesto_paraquedista.length;
            index3++
          ) {
            const instrutor = marcacao.sky_manifesto_paraquedista[index3]; // Corrigido "instutor" para "instrutor"

            // Clonar a lista original de instrutores
            let selectOptions = $("<select>")
              .html(htmlSelectInstrutor)
              .find("option")
              .clone();
            // Criar uma nova coleção filtrada
            let filteredOptions = $();
            const instrutoresUsados = instrutoresPorManifesto[idManifesto];
            selectOptions.each(function () {
              const optionValue = $(this).val();
              // Adicionar à nova coleção apenas se não estiver em instrutoresUsados ou for o instrutor atual
              if (
                !instrutoresUsados.has(optionValue) ||
                optionValue === String(instrutor.id_paraquedista)
              ) {
                filteredOptions = filteredOptions.add($(this).clone());
              }
            });

            let selectOptions2 = $("<select>")
              .html(htmlSelectCamara)
              .find("option")
              .clone();
            // Criar uma nova coleção filtrada
            let filteredOptions2 = $();
            const instrutoresUsados2 = instrutoresPorManifesto[idManifesto];
            selectOptions2.each(function () {
              const optionValue = $(this).val();
              // Adicionar à nova coleção apenas se não estiver em instrutoresUsados ou for o instrutor atual
              if (
                !instrutoresUsados2.has(optionValue) ||
                optionValue === String(instrutor.id_paraquedista)
              ) {
                filteredOptions2 = filteredOptions2.add($(this).clone());
              }
            });
            // Aplicar o HTML filtrado ao select
            if ($(`#marcacao_instrutor_${instrutor.id}`).hasClass("primeiro")) {
              $(`#marcacao_instrutor_${instrutor.id}`).html(filteredOptions);
            } else {
              $(`#marcacao_instrutor_${instrutor.id}`).html(filteredOptions2);
            }
            $(`#marcacao_instrutor_${instrutor.id}`).val(
              instrutor.id_paraquedista != null
                ? String(instrutor.id_paraquedista)
                : "0",
            ); // Garantir string
            //$(`#marcacao_instrutor_${instrutor.id}`).addClass('select2-manifesto').select2({
            //	dropdownParent: $(`#manifesto_marcacoes_${marcacao.id_manifesto}`)
            //});
          }
        }
      }

      // loadDrag();

      // Para abrir a lista de +tempo no manifesto
      $(".btn_lista_manifesto_tempo").click(function (e) {
        let lista = $(this).siblings(".lista_manifesto_tempo");
        let isVisible = lista.is(":visible");

        $(".lista_manifesto_tempo").hide();

        if (!isVisible) {
          lista.show();
          let botao = $(this);
          lista.css({
            top: botao.outerHeight(),
          });
        }

        e.stopPropagation();
      });

      $(document).click(function (e) {
        if (!$(e.target).closest(".opcoes_lista_manifesto_tempo").length) {
          $(".lista_manifesto_tempo").hide();
        }
      });
    }
  </script>
</html>
