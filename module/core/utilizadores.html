<style type="text/css">

	table {
		position: relative; /* Necessário para o posicionamento relativo */
		overflow: visible; /* Permite que o dropdown seja exibido */
	}
	
	.btn-outline-secondary-transparent {
	  color: #6c757d; /* Cor do texto */
	  border-color: transparent; /* Borda transparente */
	}
	
	.btn-outline-secondary-transparent:hover {
	  color: #fff; /* Texto branco ao passar o mouse */
	  background-color: #6c757d; /* Fundo cinza ao passar o mouse */
	  border-color: transparent; /* Borda permanece transparente */
	}
	
	.btn-outline-secondary-transparent:focus, 
	.btn-outline-secondary-transparent.focus {
	  box-shadow: 0 0 0 0.2rem rgba(108, 117, 125, 0.5); /* Foco com sombra */
	}
	
	.btn-outline-secondary-transparent.disabled, 
	.btn-outline-secondary-transparent:disabled {
	  color: #6c757d; /* Texto permanece cinza */
	  background-color: transparent; /* Fundo transparente */
	  border-color: transparent; /* Borda transparente */
	}
	
	.btn-outline-secondary-transparent:not(:disabled):not(.disabled):active, 
	.btn-outline-secondary-transparent:not(:disabled):not(.disabled).active,
	.show > .btn-outline-secondary-transparent.dropdown-toggle {
	  color: #fff; /* Texto branco ao ativar */
	  background-color: #6c757d; /* Fundo cinza ao ativar */
	  border-color: transparent; /* Borda permanece transparente */
	}
	
	.btn-outline-secondary-transparent:not(:disabled):not(.disabled):active:focus, 
	.btn-outline-secondary-transparent:not(:disabled):not(.disabled).active:focus,
	.show > .btn-outline-secondary-transparent.dropdown-toggle:focus {
	  box-shadow: 0 0 0 0.2rem rgba(108, 117, 125, 0.5); /* Sombra no foco ativo */
	}
	
	
	.hidden-dropdown {
		display: none; /* Oculto por padrão */
		position: absolute; /* Necessário para posicionamento dinâmico */
		background-color: white;
		border: 1px solid #ccc;
		border-radius: 4px;
		padding: 10px;
		box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
		z-index: 1000; /* Garante que o dropdown aparece acima */
	}
</style>
