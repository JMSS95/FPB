      <script>
        $(function () {
          var url = window.location.href;
          var temporal = new Date().valueOf();
          var partir = url.split("index.html");
          window.history.pushState("", "", partir[0]);
          if (localStorage.getItem("sessionPages")) {
            var retrievedObject = localStorage
              .getItem("sessionPages")
              .split(".");
            retrievedObject = JSON.parse(getBase64Decode(retrievedObject[1]));
            $("#footerhook").load("footer.html");
            if (retrievedObject.link == "") {
              $("#page").load("login.html?v=" + temporal);
            } else {
              $("#page").load(
                retrievedObject.link + "?v=" + temporal,
                function (responseTxt, statusTxt, xhr) {
                  if (statusTxt == "success") {
                  } else {
                    loadpage("module/core/dashboard.html?v=" + temporal, 0, 0);
                  }
                },
              );
            }
            if (retrievedObject.sub != 0) {
              $("#sub" + retrievedObject.sub)
                .addClass("expand")
                .children(".sub-menu")
                .show();
            }
            $("#menu" + retrievedObject.page).addClass("active");
            perm = retrievedObject.perm;
            retrievedObject = "";
          } else {
            window.location.assign("login.html");
          }
        });
      </script>
      <div id="page"></div>
      <div id="footerhook"></div>
